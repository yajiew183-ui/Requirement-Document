<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>金股齐鸣文字直播间 - 历史流</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        /* 手机外壳容器 */
        .phone-container {
            width: 375px;
            height: 812px;
            background-color: #ffffff;
            box-shadow: 0 0 25px rgba(0,0,0,0.2);
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            border: 8px solid #1a1a1a;
            display: flex;
            flex-direction: column;
        }

        /* 状态栏 */
        .status-bar {
            height: 44px;
            padding: 0 24px 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            background: #fff;
            color: #000;
            flex-shrink: 0;
        }
        .status-right { display: flex; gap: 4px; align-items: center; font-size: 12px; }
        .battery-icon { background: #000; color: #fff; font-size: 9px; padding: 1px 3px; border-radius: 4px; font-weight: bold; }

        /* 导航栏 */
        .wechat-header {
            background-color: #ffffff;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            flex-shrink: 0;
        }
        .wechat-header .left-icons { display: flex; gap: 18px; font-size: 18px; color: #333; cursor: pointer; }
        .wechat-header .title { font-size: 16px; font-weight: 500; color: #111; }
        .wechat-header .capsule-btn {
            width: 76px; height: 28px; border: 1px solid #eaeaea; border-radius: 14px;
            display: flex; align-items: center; justify-content: space-around; padding: 0 8px; background: #fff;
        }
        .capsule-dot { width: 6px; height: 6px; background: #000; border-radius: 50%; }
        .capsule-circle { width: 12px; height: 12px; border: 2px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .capsule-inner-dot { width: 4px; height: 4px; background: #000; border-radius: 50%; }

        /* 公告通知 */
        .announcement-bar {
            background-color: #3f2220; color: #cf9b99; height: 34px;
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 12px; flex-shrink: 0;
        }
        .announcement-bar .label { color: #e74c3c; font-weight: bold; margin-right: 2px; }
        .announcement-bar .close-btn { color: #fff; font-size: 16px; cursor: pointer; opacity: 0.6; }

        /* 红色主 Banner 区域 */
        .live-banner {
            background: linear-gradient(135deg, #e6432d, #cc321e);
            padding: 12px 14px;
            color: #fff;
            position: relative;
            flex-shrink: 0;
        }
        .banner-compliance { display: flex; justify-content: flex-end; font-size: 9px; color: rgba(255, 255, 255, 0.7); margin-bottom: 2px; }
        .banner-main { display: flex; align-items: center; gap: 10px; position: relative; z-index: 2; }
        .banner-logo { 
            width: 38px; height: 38px; background: #fff; border-radius: 6px; overflow: hidden; 
            display: flex; flex-direction: column; font-size: 7px; font-weight: bold; text-align: center;
        }
        .logo-top { background: #cc321e; color: #fff; padding: 2px 0; font-size: 6px; }
        .logo-bottom { color: #cc321e; flex: 1; display: flex; align-items: center; justify-content: center; line-height: 1.1; }
        
        .banner-info { display: flex; flex-direction: column; flex: 1; }
        .banner-info h3 { font-size: 15px; font-weight: 600; }
        .banner-info p { font-size: 10px; color: rgba(255,255,255,0.75); margin-top: 3px; }
        
        /* 修改后：颜色和字号完全继承小字规范 (rgba白色带透明度，10px大小) */
        .banner-more-btn {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.75);
            cursor: pointer;
            padding: 10px 4px 0 4px; /* 略微下移，对齐小字行视觉平衡 */
            transition: opacity 0.2s;
            position: relative;
            z-index: 10;
            user-select: none;
            align-self: flex-end; /* 靠右下角布局 */
        }
        .banner-more-btn:hover { opacity: 0.6; }

        /* Tabs 切换 */
        .tabs-nav { display: flex; background: #fff; height: 42px; align-items: center; border-bottom: 1px solid #f2f2f2; flex-shrink: 0; }
        .tab-item { flex: 1; text-align: center; font-size: 14px; color: #666; position: relative; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .tab-item.active { color: #e6432d; font-weight: bold; font-size: 15px; }
        .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 22px; height: 3px; background-color: #e6432d; border-radius: 2px; }

        /* 主消息流区 */
        .chat-container { flex: 1; background-color: #ffffff; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 18px; }
        .msg-item { display: flex; gap: 10px; align-items: flex-start; }
        .avatar-box { width: 36px; height: 36px; border-radius: 50%; background: #cc321e; flex-shrink: 0; }
        .msg-content-area { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .msg-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #999; }
        .msg-name { color: #666; }
        .msg-bubble { background: #e6f0fa; color: #111; border-radius: 8px; padding: 10px 12px; font-size: 13.5px; line-height: 1.5; max-width: 100%; word-break: break-all; }
        .msg-bubble.text-normal { background: #e6f0fa; color: #000; font-size: 15px; font-weight: 500; display: inline-block; }
        .msg-bubble.text-strategy { background: #edf5ff; color: #333; }
        .expand-trigger { color: #e6432d; font-size: 13px; margin-top: 4px; cursor: pointer; }
        .disclaimer-text { font-size: 10px; color: #b5b5b5; margin-top: 6px; line-height: 1.3; }

        /* 底部交互区域 */
        .bottom-interactive-area { background-color: #f7f7f9; border-top: 1px solid #eaeaea; display: flex; flex-direction: column; flex-shrink: 0; }
        .filter-tags-row { display: flex; gap: 8px; padding: 10px 14px 4px 14px; }
        .tag-btn { background: #ffffff; border: 1px solid #e8e8e8; padding: 4px 10px; border-radius: 12px; font-size: 11px; color: #333; display: flex; align-items: center; gap: 3px; }
        .tag-btn .icon-funnel { color: #e6432d; font-size: 12px; }
        .input-main-bar { display: flex; align-items: center; padding: 6px 14px 10px 14px; gap: 10px; }
        .input-field-box { flex: 1; background: #ffffff; border-radius: 6px; height: 36px; display: flex; align-items: center; padding: 0 10px; border: 1px solid #e8e8e8; }
        .input-placeholder { color: #999; font-size: 14px; }
        .action-icons-group { display: flex; align-items: center; gap: 12px; color: #555; font-size: 22px; }
        .btn-send { background-color: #f25643; color: #fff; border: none; border-radius: 4px; width: 48px; height: 30px; font-size: 13px; font-weight: 500; }
        .bottom-bar { height: 20px; background: #f7f7f9; display: flex; justify-content: center; align-items: center; flex-shrink: 0; padding-bottom: 4px; }
        .home-indicator { width: 124px; height: 4.5px; background: #000; border-radius: 3px; }

        /* ==================== 7天选择弹窗 ==================== */
        .history-panel-mask {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); display: none; z-index: 999;
            justify-content: flex-end; flex-direction: column;
        }
        .history-panel-mask.active { display: flex; }
        
        .history-slider-content {
            background: #ffffff; border-radius: 16px 16px 0 0; width: 100%;
            padding: 20px 16px 30px 16px; box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            animation: slideUp 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .history-title {
            text-align: center; font-size: 16px; font-weight: 600; color: #111; margin-bottom: 20px; position: relative;
        }
        .history-close-x {
            position: absolute; right: 4px; top: -2px; font-size: 20px; color: #999; cursor: pointer;
        }

        .days-only-container {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px;
        }
        
        .day-badge-item {
            background: #f5f6f8; border: 1px solid #eee; border-radius: 8px; height: 48px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.15s;
        }
        .day-badge-item .date-num { font-size: 15px; font-weight: bold; color: #333; }
        .day-badge-item .month-label { font-size: 10px; color: #777; margin-top: 1px; }

        .day-badge-item.selected {
            background: #e6432d !important; border-color: #e6432d !important;
        }
        .day-badge-item.selected .date-num,
        .day-badge-item.selected .month-label {
            color: #ffffff !important;
        }
        
        .day-badge-item.today-mark { border: 1.5px solid #e6432d; background: #fff1f0; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="status-bar">
        <div class="status-left">11:06</div>
        <div class="status-right">📶 5G <span class="battery-icon">53</span></div>
    </div>

    <div class="wechat-header">
        <div class="left-icons"><span>〈</span> <span>↻</span></div>
        <div class="title">天鼎策略</div>
        <div class="capsule-btn">
            <div class="capsule-dot"></div>
            <div class="capsule-circle"><div class="capsule-inner-dot"></div></div>
        </div>
    </div>

    <div class="announcement-bar">
        <div><span class="label">公告：</span>交易须知：</div>
        <div class="close-btn">×</div>
    </div>

    <div class="live-banner">
        <div class="banner-compliance"><span>投资有风险 入市需谨慎</span></div>
        <div class="banner-main">
            <div class="banner-logo">
                <span class="logo-top">金股齐鸣</span>
                <span class="logo-bottom">实时直播</span>
            </div>
            <div class="banner-info">
                <h3>金股齐鸣文字直播间</h3>
                <p>江苏天鼎证券投资咨询有限公司（ZX0123）</p>
            </div>
            <div class="banner-more-btn" id="moreHistoryBtn">more</div>
        </div>
    </div>

    <div class="tabs-nav">
        <div class="tab-item active">观点</div>
        <div class="tab-item">互动</div>
        <div class="tab-item">傅豪老师</div>
    </div>

    <div class="chat-container">
        <div class="msg-item">
            <div class="avatar-box"></div>
            <div class="msg-content-area">
                <div class="msg-meta"><span class="msg-name">金股齐鸣</span><span>7.01 17:45:00</span></div>
                <div class="msg-bubble text-normal">133</div>
            </div>
        </div>

        <div class="msg-item">
            <div class="avatar-box"></div>
            <div class="msg-content-area">
                <div class="msg-meta"><span class="msg-name">金股齐鸣</span><span>7.02 09:22:00</span></div>
                <div class="msg-bubble text-strategy">
                    7/2，星期四 1）券商，这波行情的核心变量...
                    <div class="expand-trigger">全文 ∨</div>
                    <div class="disclaimer-text">观点策略不作为买卖依据，据此操作风险自负。</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-interactive-area">
        <div class="filter-tags-row">
            <div class="tag-btn"><span class="icon-funnel">☌</span> 筛选老师</div>
        </div>
        <div class="input-main-bar">
            <div class="input-field-box"><div class="input-placeholder">留言...</div></div>
            <div class="action-icons-group"><div class="icon-btn">☺</div><div class="icon-btn">+</div></div>
            <button class="btn-send">发送</button>
        </div>
    </div>

    <div class="bottom-bar"><div class="home-indicator"></div></div>

    <div class="history-panel-mask" id="historyPanelMask">
        <div class="history-slider-content">
            <div class="history-title">
                按日期查找
                <span class="history-close-x" id="hidePanelX">×</span>
            </div>
            
            <div class="days-only-container">
                <div class="day-badge-item" data-date="2026-06-26">
                    <span class="date-num">26</span><span class="month-label">6月</span>
                </div>
                <div class="day-badge-item" data-date="2026-06-27">
                    <span class="date-num">27</span><span class="month-label">6月</span>
                </div>
                <div class="day-badge-item" data-date="2026-06-28">
                    <span class="date-num">28</span><span class="month-label">6月</span>
                </div>
                <div class="day-badge-item" data-date="2026-06-29">
                    <span class="date-num">29</span><span class="month-label">6月</span>
                </div>
                <div class="day-badge-item" data-date="2026-06-30">
                    <span class="date-num">30</span><span class="month-label">6月</span>
                </div>
                <div class="day-badge-item" data-date="2026-07-01">
                    <span class="date-num">01</span><span class="month-label">7月</span>
                </div>
                <div class="day-badge-item today-mark selected" data-date="2026-07-02">
                    <span class="date-num">02</span><span class="month-label">今天</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const moreHistoryBtn = document.getElementById('moreHistoryBtn');
    const historyPanelMask = document.getElementById('historyPanelMask');
    const hidePanelX = document.getElementById('hidePanelX');
    const dayBadges = document.querySelectorAll('.day-badge-item');

    // 点击 more 唤起历史面板
    moreHistoryBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        historyPanelMask.classList.add('active');
    });

    // 关闭按钮
    hidePanelX.addEventListener('click', () => {
        historyPanelMask.classList.remove('active');
    });
    historyPanelMask.addEventListener('click', (e) => {
        if(e.target === historyPanelMask) historyPanelMask.classList.remove('active');
    });

    // 切换选中高亮
    dayBadges.forEach(badge => {
        badge.addEventListener('click', () => {
            dayBadges.forEach(b => b.classList.remove('selected'));
            badge.classList.add('selected');
            console.log("切换历史数据至: " + badge.getAttribute('data-date'));
        });
    });
</script>
</body>
</html>
